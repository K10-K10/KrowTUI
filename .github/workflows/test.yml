name: C++ Google Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y libncurses5-dev libncursesw5-dev libgtest-dev

    - name: Configure CMake
      run: cmake -S . -B build -DTERMINAL_BUILD_TESTS=ON

    - name: Build Project
      run: cmake --build build

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
