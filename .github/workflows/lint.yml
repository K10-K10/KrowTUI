name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake cppcheck

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc')
          if [ -n "$files" ]; then
            clang-tidy -p build/ $files --warnings-as-errors='*'
          fi

      - name: Run cppcheck
        run: |
          cppcheck -I include --enable=all --inconclusive src/ --suppress=missingIncludeSystem --suppress=unusedFunction
