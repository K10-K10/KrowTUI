name: 🐛 Bug Report
description: File a report to help us reproduce and fix a bug.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Tell us how to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment / Context
      description: OS, terminal environment, or app version where this occurred.
      placeholder: Windows 11, bash, ver0.0.0
    validations:
      required: false

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs about the problem here.
    validations:
      required: false
